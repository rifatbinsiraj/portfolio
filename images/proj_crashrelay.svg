  <text x="400" y="380" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="#ffffff">crashrelay</text>
  <text x="400" y="410" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#ff5f56">npm package &#183; crash/5xx capture &#8594; auto-filed tickets</text>
