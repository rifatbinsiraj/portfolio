<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#241417"/>
      <stop offset="1" stop-color="#3a1f24"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="65%">
      <stop offset="0" stop-color="#ffbd39" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#ffbd39" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#glow)"/>
  <g transform="translate(20,20)">
    <circle cx="10" cy="10" r="6" fill="#ff5f56"/>
    <circle cx="32" cy="10" r="6" fill="#ffbd2e"/>
    <circle cx="54" cy="10" r="6" fill="#27c93f"/>
  </g>
  <!-- product grid -->
  <g>
    <rect x="230" y="90" width="90" height="90" rx="8" fill="#ffffff" opacity="0.92"/>
    <rect x="335" y="90" width="90" height="90" rx="8" fill="#ffffff" opacity="0.75"/>
    <rect x="440" y="90" width="90" height="90" rx="8" fill="#ffffff" opacity="0.92"/>
    <rect x="255" y="115" width="40" height="40" rx="6" fill="#ffbd39"/>
    <rect x="360" y="115" width="40" height="40" rx="6" fill="#ff8a5c"/>
    <rect x="465" y="115" width="40" height="40" rx="6" fill="#ffbd39"/>
  </g>
  <!-- shopping bag -->
  <g transform="translate(400,290)">
    <path d="M-60,-20 h120 l-10,90 a10,10 0 0 1 -10,10 h-80 a10,10 0 0 1 -10,-10 Z" fill="#ffbd39"/>
    <path d="M-30,-20 v-15 a30,30 0 0 1 60,0 v15" stroke="#ffffff" stroke-width="8" fill="none"/>
  </g>
  <text x="400" y="400" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#ffffff">ShopVerse</text>
  <text x="400" y="428" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#ffbd39">Full-Stack E-Commerce &#183; NestJS &#183; React</text>
