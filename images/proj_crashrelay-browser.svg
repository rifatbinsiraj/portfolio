    <radialGradient id="glow" cx="50%" cy="35%" r="65%">
      <stop offset="0" stop-color="#4fa3ff" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#4fa3ff" stop-opacity="0"/>
