    <!-- key -->
    <circle cx="-18" cy="-10" r="18" fill="none" stroke="#12161c" stroke-width="9"/>
    <line x1="-4" y1="4" x2="34" y2="42" stroke="#12161c" stroke-width="9" stroke-linecap="round"/>
    <line x1="18" y1="28" x2="30" y2="16" stroke="#12161c" stroke-width="9" stroke-linecap="round"/>
    <line x1="26" y1="36" x2="38" y2="24" stroke="#12161c" stroke-width="9" stroke-linecap="round"/>
