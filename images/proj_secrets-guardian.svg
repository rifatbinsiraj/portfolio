  <text x="400" y="380" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="#ffffff">secrets-guardian</text>
  <text x="400" y="410" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#ffbd39">npm package &#183; catch leaked keys before commit</text>
